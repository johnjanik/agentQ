services:
  # AgentRQ main application
  agentrq:
    # Build the image from this repo's source so the running binary matches the
    # audited code, instead of pulling the upstream prebuilt image.
    # See SECURITY-REVIEW.md #6. Build with: docker compose build
    build:
      context: .
      dockerfile: Dockerfile
    image: agentrq-local:latest
    container_name: agentrq
    restart: unless-stopped
    ports:
      - "${PORT:-2026}:${PORT:-2026}"
    environment:
      # Core settings
      ENV: ${ENV:-production}
      PORT: ${PORT:-2026}
      AGENTRQ_BASE_URL: ${AGENTRQ_BASE_URL}
      AGENTRQ_DOMAIN: ${AGENTRQ_DOMAIN}

      # Auth (required)
      AGENTRQ_AUTH_JWT_SECRET: ${AGENTRQ_AUTH_JWT_SECRET}
      AGENTRQ_AUTH_WORKSPACE_TOKEN_KEY: ${AGENTRQ_AUTH_WORKSPACE_TOKEN_KEY}
      AGENTRQ_AUTH_ROOT_LOGIN_ENABLED: ${AGENTRQ_AUTH_ROOT_LOGIN_ENABLED:-false}
      AGENTRQ_AUTH_ROOT_ACCESS_TOKEN: ${AGENTRQ_AUTH_ROOT_ACCESS_TOKEN:-}

      # Google OAuth (required)
      AGENTRQ_ACCOUNTS_OAUTH2_CLI_GOOGLE_CLIENT_ID: ${AGENTRQ_ACCOUNTS_OAUTH2_CLI_GOOGLE_CLIENT_ID}
      AGENTRQ_ACCOUNTS_OAUTH2_CLI_GOOGLE_CLIENT_SECRET: ${AGENTRQ_ACCOUNTS_OAUTH2_CLI_GOOGLE_CLIENT_SECRET}

      # Database: SQLite (default)
      AGENTRQ_SQLITE_ENABLED: ${AGENTRQ_SQLITE_ENABLED:-true}
      AGENTRQ_SQLITE_DSN: ${AGENTRQ_SQLITE_DSN:-/storage/agentrq.db}

      # Database: PostgreSQL (optional, disable SQLite if using Postgres)
      AGENTRQ_POSTGRES_ENABLED: ${AGENTRQ_POSTGRES_ENABLED:-false}
      AGENTRQ_POSTGRES_HOST: ${AGENTRQ_POSTGRES_HOST:-postgres}
      AGENTRQ_POSTGRES_PORT: ${AGENTRQ_POSTGRES_PORT:-5432}
      AGENTRQ_POSTGRES_USER: ${AGENTRQ_POSTGRES_USER:-postgres}
      AGENTRQ_POSTGRES_PASSWORD: ${AGENTRQ_POSTGRES_PASSWORD:-}
      AGENTRQ_POSTGRES_DBNAME: ${AGENTRQ_POSTGRES_DBNAME:-agentrq}

      # TLS (for production)
      AGENTRQ_SSL_ENABLED: ${AGENTRQ_SSL_ENABLED:-false}
      AGENTRQ_SSL_LETSENCRYPT_EMAIL: ${AGENTRQ_SSL_LETSENCRYPT_EMAIL:-}
      AGENTRQ_SSL_CACHE_DIR: ${AGENTRQ_SSL_CACHE_DIR:-/_certs}
      AGENTRQ_SSL_CLOUDFLARE_API_TOKEN: ${AGENTRQ_SSL_CLOUDFLARE_API_TOKEN:-}

      # Email notifications (optional)
      AGENTRQ_SMTP_ENABLED: ${AGENTRQ_SMTP_ENABLED:-false}
      AGENTRQ_SMTP_HOST: ${AGENTRQ_SMTP_HOST:-}
      AGENTRQ_SMTP_PORT: ${AGENTRQ_SMTP_PORT:-587}
      AGENTRQ_SMTP_USERNAME: ${AGENTRQ_SMTP_USERNAME:-}
      AGENTRQ_SMTP_PASSWORD: ${AGENTRQ_SMTP_PASSWORD:-}
      AGENTRQ_SMTP_FROM: ${AGENTRQ_SMTP_FROM:-}

      # Slack integration (optional)
      AGENTRQ_SLACK_ENABLED: ${AGENTRQ_SLACK_ENABLED:-false}
      AGENTRQ_SLACK_CLIENT_ID: ${AGENTRQ_SLACK_CLIENT_ID:-}
      AGENTRQ_SLACK_CLIENT_SECRET: ${AGENTRQ_SLACK_CLIENT_SECRET:-}
      AGENTRQ_SLACK_SIGNING_SECRET: ${AGENTRQ_SLACK_SIGNING_SECRET:-}
      AGENTRQ_SLACK_APP_ID: ${AGENTRQ_SLACK_APP_ID:-}

      # Security
      AGENTRQ_DDOS_ENABLED: ${AGENTRQ_DDOS_ENABLED:-true}
      AGENTRQ_DDOS_MAX_REQ_PER_SEC: ${AGENTRQ_DDOS_MAX_REQ_PER_SEC:-20}
      AGENTRQ_DDOS_BLOCK_DURATION: ${AGENTRQ_DDOS_BLOCK_DURATION:-5m}
      AGENTRQ_RATELIMIT_ENABLED: ${AGENTRQ_RATELIMIT_ENABLED:-true}
      AGENTRQ_RATELIMIT_MAX_PER_IP: ${AGENTRQ_RATELIMIT_MAX_PER_IP:-60}
      AGENTRQ_RATELIMIT_MAX_PER_USER: ${AGENTRQ_RATELIMIT_MAX_PER_USER:-100}
      AGENTRQ_RATELIMIT_WINDOW: ${AGENTRQ_RATELIMIT_WINDOW:-60s}

    volumes:
      - ./storage:/storage
      # Attachment store. The app writes to ./_storage (relative to the
      # container workdir /), which the non-root user cannot create unless it is
      # a mounted, writable volume.
      - ./_storage:/_storage
      - ./certs:/_certs
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  # Optional: PostgreSQL database (for production)
  postgres:
    image: postgres:16-alpine
    container_name: agentrq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AGENTRQ_POSTGRES_DBNAME:-agentrq}
      POSTGRES_USER: ${AGENTRQ_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${AGENTRQ_POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${AGENTRQ_POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    # Only start if AGENTRQ_POSTGRES_ENABLED=true
    profiles:
      - postgres

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: agentrq-network
